<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Forensic Bone Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #0d1626; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
        .icon { font-size: 36px; text-align: center; margin-bottom: 8px; }
        .title { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; text-align: center; margin-bottom: 4px; }
        .sub   { font-size: 13px; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 32px; }
        .label { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .input { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #e2e8f0; font-size: 14px; outline: none; margin-bottom: 18px; transition: border-color 0.2s; }
        .input:focus { border-color: #7c3aed; }
        .btn  { width: 100%; padding: 13px; background: #7c3aed; color: white; border: none; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
        .btn:hover { background: #6d28d9; box-shadow: 0 8px 24px rgba(124,58,237,0.35); }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔐</div>
    <div class="title">Admin Access</div>
    <div class="sub">Forensic Bone Analysis System</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
        <label class="label">Username</label>
        <input type="text" name="username" class="input" placeholder="admin" required autofocus>

        <label class="label">Password</label>
        <input type="password" name="password" class="input" placeholder="••••••••" required>

        <button type="submit" class="btn">Login →</button>
    </form>
</div>
</body>
</html>
